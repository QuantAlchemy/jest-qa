  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: hsl(222, 47%, 11%);
      --purple: hsl(262, 90%, 66%);
      --purple-dark: hsl(262, 80%, 58%);
      --gold: hsl(46, 100%, 45%);
      --gold-light: hsl(46, 100%, 53%);
      --teal: hsl(159, 62%, 41%);
      --text: hsl(210, 40%, 95%);
      --text-muted: hsl(210, 20%, 55%);
    }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      user-select: none;
      -webkit-user-select: none;
      cursor: pointer;
    }

    /* Particle background */
    .particles {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }

    .particle {
      position: absolute;
      border-radius: 50%;
      background: var(--text);
      animation: float linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(0) translateX(0); opacity: var(--p-opacity); }
      50% { transform: translateY(calc(var(--drift-y) * 0.5)) translateX(var(--drift-x)); opacity: calc(var(--p-opacity) * 1.2); }
      100% { transform: translateY(var(--drift-y)) translateX(calc(var(--drift-x) * 0.5)); opacity: 0; }
    }

    /* Main layout */
    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 2rem 1.5rem;
      gap: 1.5rem;
    }

    /* Logo */
    .logo {
      width: 64px;
      height: 64px;
      filter: drop-shadow(0 0 12px hsla(262, 90%, 66%, 0.4));
      animation: glow-pulse 3s ease-in-out infinite;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      flex-shrink: 0;
    }

    .logo.wiggle {
      animation: wiggle 0.5s ease-in-out;
    }

    @keyframes glow-pulse {
      0%, 100% { filter: drop-shadow(0 0 12px hsla(262, 90%, 66%, 0.3)); }
      50% { filter: drop-shadow(0 0 20px hsla(262, 90%, 66%, 0.6)); }
    }

    @keyframes wiggle {
      0% { transform: rotate(0deg) scale(1); }
      20% { transform: rotate(-12deg) scale(1.05); }
      40% { transform: rotate(10deg) scale(1.05); }
      60% { transform: rotate(-6deg) scale(1.02); }
      80% { transform: rotate(4deg) scale(1.01); }
      100% { transform: rotate(0deg) scale(1); }
    }

    /* Counter */
    .counter {
      font-family: 'IBM Plex Sans', sans-serif;
      font-weight: 500;
      font-size: 0.85rem;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    /* Joke card */
    .card {
      max-width: 580px;
      width: 100%;
      padding: 2.5rem 2rem;
      border-radius: 1rem;
      background: hsla(222, 47%, 15%, 0.6);
      border: 1px solid hsla(262, 90%, 66%, 0.12);
      box-shadow:
        0 0 40px hsla(262, 90%, 66%, 0.08),
        0 4px 24px hsla(0, 0%, 0%, 0.3);
      transition: transform 0.25s ease, box-shadow 0.25s ease;
    }

    @media (hover: hover) {
      .card:hover {
        transform: translateY(-2px);
        box-shadow:
          0 0 50px hsla(262, 90%, 66%, 0.14),
          0 8px 32px hsla(0, 0%, 0%, 0.35);
      }
    }

    .joke-text {
      font-family: 'Fraunces', serif;
      font-size: 1.65rem;
      line-height: 1.5;
      text-align: center;
      min-height: 3em;
      display: block;
      word-break: break-word;
    }

    .joke-text span {
      display: inline;
      transition: color 0.05s;
    }

    .joke-text .scrambling {
      color: var(--purple);
    }

    /* CTA banner */
    .cta {
      font-size: 0.85rem;
      font-weight: 500;
      color: var(--gold);
      text-decoration: none;
      padding: 0.45rem 1.2rem;
      border-radius: 999px;
      border: 1px solid hsla(46, 100%, 45%, 0.25);
      background: hsla(46, 100%, 45%, 0.08);
      opacity: 0;
      transform: translateY(6px);
      transition: opacity 0.5s ease, transform 0.5s ease, background 0.2s ease;
      pointer-events: none;
      flex-shrink: 0;
    }

    .cta.visible {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .cta:hover {
      background: hsla(46, 100%, 45%, 0.15);
    }

    /* Hint */
    .hint {
      font-size: 0.78rem;
      color: var(--text-muted);
      letter-spacing: 0.04em;
      opacity: 0.7;
      flex-shrink: 0;
    }

    /* Mobile adjustments */
    @media (max-width: 600px) {
      .joke-text {
        font-size: 1.3rem;
      }
      .card {
        padding: 2rem 1.5rem;
      }

  <script>
  (function () {
    'use strict';

    // --- Particles ---
    const particlesEl = document.getElementById('particles');
    const PARTICLE_COUNT = 25;
    for (let i = 0; i < PARTICLE_COUNT; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      const size = Math.random() * 3 + 1;
      const opacity = Math.random() * 0.3 + 0.05;
      const left = Math.random() * 100;
      const top = Math.random() * 100;
      const duration = Math.random() * 20 + 15;
      const delay = Math.random() * -30;
      const driftX = (Math.random() - 0.5) * 80;
      const driftY = -(Math.random() * 600 + 300);
      p.style.cssText = `
        width:${size}px;height:${size}px;
        left:${left}%;top:${top}%;
        --p-opacity:${opacity};
        --drift-x:${driftX}px;
        --drift-y:${driftY}px;
        animation-duration:${duration}s;
        animation-delay:${delay}s;
      `;
      particlesEl.appendChild(p);
    }

    // --- Fisher-Yates shuffle ---
    function shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    // --- Joke state ---
    let order = shuffle(JOKES);
    let idx = 0;
    let jokeCount = 0;
    let isAnimating = false;

    const jokeEl = document.getElementById('joke');
    const counterEl = document.getElementById('counter');
    const ctaEl = document.getElementById('cta');
    const logoEl = document.getElementById('logo');

    // --- Text Scramble Engine ---
    const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*';

    function scrambleIn(text) {
      return new Promise(resolve => {
        isAnimating = true;
        const len = text.length;
        const resolved = new Array(len).fill(false);
        const current = new Array(len);

        // Init all to random
        for (let i = 0; i < len; i++) {
          current[i] = text[i] === ' ' ? ' ' : CHARS[Math.floor(Math.random() * CHARS.length)];
        }

        const totalDuration = 800;
        const perChar = totalDuration / len;
        let frame;

        function render() {
          let html = '';
          for (let i = 0; i < len; i++) {
            if (text[i] === ' ') {
              html += ' ';
            } else if (resolved[i]) {
              html += `<span>${escHtml(current[i])}</span>`;
            } else {
              html += `<span class="scrambling">${escHtml(current[i])}</span>`;
            }
          }
          jokeEl.innerHTML = html;
        }

        // Scramble interval
        const scrambleInterval = setInterval(() => {
          for (let i = 0; i < len; i++) {
            if (!resolved[i] && text[i] !== ' ') {
              current[i] = CHARS[Math.floor(Math.random() * CHARS.length)];
            }
          }
          render();
        }, 30);

        // Resolve chars left-to-right with stagger
        for (let i = 0; i < len; i++) {
          if (text[i] === ' ') {
            resolved[i] = true;
            current[i] = ' ';
            continue;
          }
          setTimeout(() => {
            resolved[i] = true;
            current[i] = text[i];
            if (i === len - 1 || resolved.every(Boolean)) {
              clearInterval(scrambleInterval);
              render();
              isAnimating = false;
              resolve();
            }
          }, perChar * i + 80);
        }

        render();
      });
    }

    function scrambleOut() {
      return new Promise(resolve => {
        const currentText = jokeEl.textContent || '';
        if (!currentText.trim()) { resolve(); return; }

        const len = currentText.length;
        let iterations = 0;
        const maxIterations = 8;

        const interval = setInterval(() => {
          let html = '';
          const opacity = 1 - (iterations / maxIterations);
          for (let i = 0; i < len; i++) {
            if (currentText[i] === ' ') {
              html += ' ';
            } else {
              const c = CHARS[Math.floor(Math.random() * CHARS.length)];
              html += `<span class="scrambling" style="opacity:${opacity}">${escHtml(c)}</span>`;
            }
          }
          jokeEl.innerHTML = html;
          iterations++;
          if (iterations >= maxIterations) {
            clearInterval(interval);
            jokeEl.innerHTML = '';
            resolve();
          }
        }, 30);
      });
    }

    function escHtml(c) {
      if (c === '&') return '&amp;';
      if (c === '<') return '&lt;';
      if (c === '>') return '&gt;';
      if (c === '"') return '&quot;';
      if (c === "'") return '&#39;';
      return c;
    }

    // --- Show joke ---
    async function showJoke(first) {
      if (isAnimating) return;

      const joke = order[idx];
      idx++;
      if (idx >= order.length) {
        order = shuffle(JOKES);
        idx = 0;
      }

      jokeCount++;
      counterEl.textContent = `${jokeCount} / ${JOKES.length}`;

      // CTA every 3rd joke
      if (jokeCount > 1 && jokeCount % 3 === 0) {
        ctaEl.classList.add('visible');
      } else {
        ctaEl.classList.remove('visible');
      }

      // Wiggle logo
      logoEl.classList.remove('wiggle');
      void logoEl.offsetWidth;
      logoEl.classList.add('wiggle');

      if (!first) {
        await scrambleOut();
      }
      await scrambleIn(joke);
    }

    // --- Interactions ---
    // Click
    document.addEventListener('click', () => showJoke(false));

    // Keyboard
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.code === 'ArrowRight') {
        e.preventDefault();
        showJoke(false);
      }
    });

    // Swipe
    let touchStartX = 0;
    let touchStartY = 0;
    document.addEventListener('touchstart', (e) => {
      touchStartX = e.changedTouches[0].clientX;
      touchStartY = e.changedTouches[0].clientY;
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
      const dx = e.changedTouches[0].clientX - touchStartX;
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (Math.abs(dx) > 50 && Math.abs(dx) > Math.abs(dy)) {
        showJoke(false);
      }
    }, { passive: true });

    // --- Init ---
    showJoke(true);
  })();
  </script>
